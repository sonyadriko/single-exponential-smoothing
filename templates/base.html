<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Depot Jawara - SES Forecasting{% endblock %}</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Archivo', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        bg: '#0f172a',
                        surface: '#1e293b',
                        surface2: '#334155',
                        border: '#475569',
                        blue: {
                            400: '#3b82f6',
                            500: '#2563eb',
                            600: '#1d4ed8',
                        },
                    }
                }
            }
        }
    </script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0f172a;
            min-height: 100vh;
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Sidebar nav */
        .nav-item {
            transition: all 0.2s ease;
            border-left: 2px solid transparent;
        }
        .nav-item:hover {
            background: rgba(59, 130, 246, 0.1);
            border-left-color: #3b82f6;
        }
        .nav-item.active {
            background: rgba(59, 130, 246, 0.15);
            border-left-color: #3b82f6;
            color: #3b82f6;
        }

        /* Buttons */
        .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #0f172a;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        .btn-secondary {
            background: transparent;
            border: 1px solid #3b82f6;
            color: #3b82f6;
            transition: all 0.2s ease;
        }
        .btn-secondary:hover {
            background: rgba(59, 130, 246, 0.1);
        }

        /* Form inputs */
        .form-input {
            background: #0f172a;
            border: 1px solid #475569;
            color: #f0f0f0;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.15);
        }

        /* Table */
        .data-table thead th {
            background: #1e293b;
            border-bottom: 1px solid #3b82f6;
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
        }
        .data-table tbody tr {
            border-bottom: 1px solid #334155;
            transition: background 0.15s ease;
        }
        .data-table tbody tr:hover {
            background: rgba(59, 130, 246, 0.05);
        }

        /* Badge */
        .badge {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.2);
            font-family: 'JetBrains Mono', monospace;
        }

        /* Status dot */
        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .status-dot.online { background: #10b981; box-shadow: 0 0 8px #10b981; }

        /* Section */
        .section {
            animation: fadeIn 0.3s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden-section { display: none; }
    </style>

    {% block head %}{% endblock %}
</head>
<body class="font-sans text-gray-200">
    {% if user %}
    <div class="flex min-h-screen">
        {% include "partials/sidebar.html" %}
        <!-- Main Content -->
        <main class="flex-1 ml-56 p-6">
            {% block content %}{% endblock %}
        </main>
    </div>
    {% endif %}

    {% block scripts %}{% endblock %}
</body>
</html>
