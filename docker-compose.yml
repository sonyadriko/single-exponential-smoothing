version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: depot_jawara_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: sales_app
      MYSQL_USER: jawara_user
      MYSQL_PASSWORD: jawara_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build: .
    container_name: depot_jawara_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://jawara_user:jawara_pass@db:3306/sales_app
      SECRET_KEY: change-this-to-a-random-secret-key-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./sales_app.db:/app/sales_app.db

volumes:
  mysql_data:
